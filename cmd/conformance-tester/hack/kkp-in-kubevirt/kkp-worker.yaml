---
apiVersion: "cluster.k8s.io/v1alpha1"
kind: MachineDeployment
metadata:
  name: conformance-tester-kkp-seed-worker
  namespace: kube-system
spec:
  paused: false
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  minReadySeconds: 0
  selector:
    matchLabels:
      name: conformance-tester-kkp-seed-worker
  template:
    metadata:
      labels:
        name: conformance-tester-kkp-seed-worker
    spec:
      metadata:
        labels:
          name: conformance-tester-kkp-seed-worker
      annotations:
        kubevirt.io/allow-pod-bridge-network-live-migration: "true"
      providerSpec:
        value:
          sshPublicKeys:
            - ""
          cloudProvider: "kubevirt"
          cloudProviderSpec:
            # clusterName: tenant
            auth:
              kubeconfig:
                # Can also be set via the env var 'KUBEVIRT_KUBECONFIG' on the machine-controller.
                # If instead specified directly, this value should be a base64 encoded kubeconfig.
                value: ""
            virtualMachine:
              template:
                cpus: "2"
                memory: "8192M"
                primaryDisk:
                  osImage: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
                  size: "25Gi"
                  storageClassName: longhorn
          # Must align with the configured registryImage above
          operatingSystem: "ubuntu"
          operatingSystemSpec:
            distUpgradeOnBoot: false
            disableAutoUpdate: true
      versions:
        kubelet: 1.33.0
