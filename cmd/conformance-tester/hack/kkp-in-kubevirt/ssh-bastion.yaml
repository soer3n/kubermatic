---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ssh-authorized-keys
  namespace: conformance-tester
data:
  authorized_keys: |
    ssh-rsa  soer3n@soer3n

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sshd-config
  namespace: conformance-tester
data:
  sshd_config: |
    Port 2222
    Protocol 2

    PermitRootLogin no
    PasswordAuthentication no
    PubkeyAuthentication yes

    AllowAgentForwarding yes
    AllowTcpForwarding yes
    X11Forwarding no

    UsePAM no

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ssh-bastion
  namespace: conformance-tester
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ssh-bastion
  template:
    metadata:
      labels:
        app: ssh-bastion
      # annotations:
      #   ovn.kubernetes.io/logical_switch: kkp-management-bgp-advertise-net
      #   ovn.kubernetes.io/ip_address: 192.168.50.20
    spec:
      initContainers:
        - name: init-sshd-config
          image: busybox
          command:
            - sh
            - -c
            - |
              mkdir -p /config/sshd
              cp /input/sshd_config /config/sshd/sshd_config
              chmod 600 /config/sshd/sshd_config
          volumeMounts:
            - name: sshd-config
              mountPath: /input
              readOnly: true
            - name: config
              mountPath: /config
      containers:
        - name: netshoot-iptables
          image: nicolaka/netshoot
          securityContext:
            privileged: true
            runAsUser: 0
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache iptables
              sleep infinity
        - name: sshd
          image: linuxserver/openssh-server:latest
          ports:
            - containerPort: 2222
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: USER_NAME
              value: bastion
            - name: PASSWORD_ACCESS
              value: "false"
            - name: SSHD_CONFIG_FILE
              value: /config/sshd/sshd_config
            - name: PUBLIC_KEY_FILE
              value: /config/keys/authorized_keys
          volumeMounts:
            - name: config
              mountPath: /config
            - name: ssh-keys
              mountPath: /config/keys
              readOnly: true
      volumes:
        - name: config
          emptyDir: {}
        - name: sshd-config
          configMap:
            name: sshd-config
        - name: ssh-keys
          configMap:
            name: ssh-authorized-keys
