apiVersion: v1
kind: Secret
metadata:
  name: kubeconfig-conformance-seed
  namespace: kubermatic
type: Opaque
data:
  kubeconfig: 

---
apiVersion: kubermatic.k8c.io/v1
kind: Seed
metadata:
  name: kubermatic
  namespace: kubermatic
spec:
  # these two fields are only informational
  country: DE
  location: conformance-tester

  # List of datacenters where this seed cluster is allowed to create clusters in
  # In this example, user cluster will be deployed in eu-central-1 on AWS.
  datacenters:
    kubeadm:
      location: local
      country: DE
      spec:
        bringyourown: {}

    kubevirt:
      country: DE
      location: conformance-tester
      spec:
        kubevirt:
          dnsConfig:
            nameservers:
            - 10.97.179.24
          dnsPolicy: None
          enableDedicatedCpus: true
          enableDefaultNetworkPolicies: true
          images:
            http:
              operatingSystems:
                ubuntu:
                  "24.04": https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
          infraStorageClasses:
          - isDefaultClass: true
            name: longhorn
          namespacedMode:
            enabled: true
            name: conformance-tester
          # providerNetwork:
          #   name: kube-ovn
          #   networkPolicyEnabled: true
            # vpcs:
            # - name: kkp-vpc-tenant-1
            #   subnets:
            #   - name: kkp-vpc-tenant-1-net-1
            #   - name: kkp-vpc-tenant-1-net-2
            # - name: kkp-vpc-tenant-2
            #   subnets:
            #   - name: kkp-vpc-tenant-2-net-1
            #   - name: kkp-vpc-tenant-2-net-2

  # DefaultComponentSettings are default values to set for newly created clusters.
  defaultComponentSettings:
    apiserver:
      endpointReconcilingDisabled: false
      nodePortRange: "30000-32767"
      resources: null
      tolerations: []
    controllerManager:
      leaderElection: {}
      resources: null
    etcd:
      clusterSize: 3
      diskSize: 5Gi
      resources: null
      # storageClass: ""
    prometheus:
      resources: {}
    scheduler:
      leaderElection: {}
      resources: null
    nodePortProxyEnvoy:
      resources: null
    konnectivityProxy:
      resources: null

  exposeStrategy: Tunneling
  etcdBackupRestore:
    destinations:
      minio:
        bucketName: kubermatic-etcd-backups
        credentials:
          name: backup-s3
          namespace: kube-system
        endpoint: http://minio.minio.svc.cluster.local:9000
    defaultDestination: minio

  metering:
    enabled: false
    # StorageClassName is the name of the storage class that the metering tool uses to save processed files before
    # exporting it to s3 bucket. Default value is kubermatic-fast.
    storageClassName: kubermatic-fast
    # StorageSize is the size of the storage class. Default value is 100Gi.
    storageSize: 10Gi
  # Optional: MLA allows configuring seed level MLA (Monitoring, Logging & Alerting) stack settings.
  mla:
    userClusterMLAEnabled: false
  # NodeportProxy can be used to configure the NodePort proxy service that is
  # responsible for making user-cluster control planes accessible from the outside.
  nodeportProxy:
    # annotations:
    #   metallb.io/address-pool: vpc-kkp-seed-nodeport-proxy
    #   metallb.io/ip-allocated-from-pool: vpc-kkp-seed-nodeport-proxy
    #  external-dns.alpha.kubernetes.io/hostname: "*.kubermatic.cloud.soer3n.dev"
    disable: false
    # Envoy configures the Envoy application itself.
    #envoy:
    #  dockerRepository: docker.io/envoyproxy/envoy-alpine
    #  resources:
    #    limits:
    #      cpu: 200m
    #      memory: 64Mi
    #    requests:
    #      cpu: 50m
    #      memory: 32Mi
    # EnvoyManager configures the Kubermatic-internal Envoy manager.
    #envoyManager:
    #  dockerRepository: quay.io/kubermatic/nodeport-proxy
    #  resources:
    #    limits:
    #      cpu: 150m
    #      memory: 48Mi
    #    requests:
    #      cpu: 50m
    #      memory: 32Mi
    # Updater configures the component responsible for updating the LoadBalancer
    # service.
    #updater:
    #  dockerRepository: quay.io/kubermatic/nodeport-proxy
    #  resources:
    #    limits:
    #      cpu: 150m
    #      memory: 32Mi
    #    requests:
    #      cpu: 50m
    #      memory: 32Mi
  # Optional: ProxySettings can be used to configure HTTP proxy settings on the
  # worker nodes in user clusters. However, proxy settings on nodes take precedence.
  proxySettings:
    # Optional: If set, this proxy will be configured for both HTTP and HTTPS.
    httpProxy: ""
    # Optional: If set this will be set as NO_PROXY environment variable on the node;
    # The value must be a comma-separated list of domains for which no proxy
    # should be used, e.g. "*.example.com,internal.dev".
    # Note that the in-cluster apiserver URL will be automatically prepended
    # to this value.
    noProxy: ""
  # reference to the kubeconfig to use when connecting to this seed cluster
  kubeconfig:
    name: kubeconfig-conformance-seed
    namespace: kubermatic
